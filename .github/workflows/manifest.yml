name: Build & Upload Bunny Manifest

on:
  push:
    branches:
      - main           # o la branca que facis servir
    paths:
      - 'manifest.json'
  workflow_dispatch: {}           # Bot¾ "Run workflow"
  schedule:
    - cron: "0 */6 * * *"        # Cada 6 h (UTC)
  
permissions:
    contents: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show workspace (pwd, ls)
        run: |
          pwd
          ls -la

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci || npm i

      # 1) Manifest de STORAGE (com fins ara)
      - name: Run storage manifest generator
        env:
          BUNNY_STORAGE_ZONE:    ${{ vars.BUNNY_STORAGE_ZONE }}
          ROOT_PREFIX:           ${{ vars.ROOT_PREFIX }}
          BUNNY_CDN_BASE:        ${{ vars.BUNNY_CDN_BASE }}
          BUNNY_STORAGE_API_KEY: ${{ secrets.BUNNY_STORAGE_API_KEY }}
          BUNNY_ACCOUNT_API_KEY: ${{ secrets.BUNNY_ACCOUNT_API_KEY }}

          # NOU
          GITHUB_EVENT_NAME:     ${{ github.event_name }}
          PINPOS_RETENTION_FILE: pinpos-retention.json
          PINPOS_RETENTION_AUTOMATIC_REFRESHES: "2"
        run: node generate-manifest.mjs

      # 2) Manifest de STREAM (nou)
      - name: Run stream manifest generator
        env:
          # Mateixos valors de Storage per pujar el manifest al mateix lloc
          BUNNY_STORAGE_ZONE:    ${{ vars.BUNNY_STORAGE_ZONE }}
          ROOT_PREFIX:           ${{ vars.ROOT_PREFIX }}
          BUNNY_STORAGE_API_KEY: ${{ secrets.BUNNY_STORAGE_API_KEY }}

          # Envs propis de Stream
          BUNNY_STREAM_LIBRARY_ID: ${{ vars.BUNNY_STREAM_LIBRARY_ID }}
          BUNNY_STREAM_API_KEY:    ${{ secrets.BUNNY_STREAM_API_KEY }}
          # Opcional: si vols sobreescriure la base de direct
          BUNNY_STREAM_DIRECT_BASE:  ${{ vars.BUNNY_STREAM_DIRECT_BASE }}
          # ?? AFEGIT: base de l'HLS
          BUNNY_STREAM_HLS_BASE:   ${{ vars.BUNNY_STREAM_HLS_BASE }}
        run: node generate-stream-manifest.mjs
      - name: Commit updated manifest and retention
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add manifest.json pinpos-retention.json
          git diff --cached --quiet || git commit -m "Update manifest and pin retention"
          git push